name: Verify TradingView ETF Names

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: stock-connect-tradingview-etf-names
  cancel-in-progress: false

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect

jobs:
  verify-tradingview-etf-names:
    name: Verify TradingView ETF English full names
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Inspect source directory
        run: |
          ls -la stock-connect

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.STOCK_CN_GHCR_TOKEN }}

      - name: Pull runtime image
        run: |
          docker pull "${IMAGE_NAME}"

      - name: Run TradingView ETF name verification
        run: |
          mkdir -p site
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/site:/workspace/site" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.main \
                --cache-dir /workspace/cache \
                --output /workspace/site/index.html \
                --skip-sse-stock-profile \
                --skip-szse-stock-profile \
                --skip-szse-etf-profile \
                --tradingview-etf-profile-limit-per-exchange 5 \
                --tradingview-etf-profile-delay 0.5 \
                --skip-sse-market-cap \
                --skip-szse-market-cap \
                --skip-etf-aum \
                --skip-etf-holdings \
                --skip-a50-index
            "

      - name: Verify generated smoke-test page
        run: |
          test -f site/index.html
          ls -lh site/index.html
