name: Generate and Deploy Stock Connect Page

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: stock-connect-page
  cancel-in-progress: false

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect

jobs:
  generate-page:
    name: Generate Stock Connect page
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull runtime image
        run: docker pull "${IMAGE_NAME}"

      - name: Generate page
        run: |
          mkdir -p site cache
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/site:/workspace/site" \
            -v "${GITHUB_WORKSPACE}/cache:/workspace/cache" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.main \
                --cache-dir /workspace/cache \
                --output /workspace/site/index.html \
                --sse-stock-profile-limit 5 \
                --szse-stock-profile-limit 5 \
                --szse-etf-profile-limit 5 \
                --tradingview-etf-profile-limit-per-exchange 5 \
                --sse-market-cap-limit 5 \
                --szse-market-cap-limit 5 \
                --etf-aum-limit 5 \
                --etf-holdings-limit 5 \
                --sse-index-limit 5 \
                --skip-sse-index-price \
                --szse-index-limit 5 \
                --skip-szse-index-price
            "

      - name: Verify generated page
        run: |
          test -f site/index.html
          ls -lh site/index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
