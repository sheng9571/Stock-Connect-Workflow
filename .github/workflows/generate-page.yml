name: Parse A50 Constituents

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: stock-connect-a50
  cancel-in-progress: false

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect

jobs:
  parse-a50:
    name: Download and parse FTSE China A50 constituents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Inspect source directory
        run: |
          ls -la stock-connect

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.STOCK_CN_GHCR_TOKEN }}

      - name: Pull runtime image
        run: |
          docker pull "${IMAGE_NAME}"

      - name: Parse A50 constituents
        run: |
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.a50_index \
                --cache-dir /workspace/cache \
                --show-rows \
                --strict-validation
            "
