name: Generate and Deploy Stock Connect Page

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "generate-page"
        type: choice
        options:
          - generate-page
          - low-frequency-cn-db-sse-stock-profiles
          - low-frequency-cn-db-sse-etf-profiles
          - low-frequency-cn-db-szse-stock-profiles
          - low-frequency-cn-db-szse-etf-profiles
  schedule:
    - cron: "4 16 * * *"

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: stock-connect-page
  cancel-in-progress: false

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect
  STOCK_DB_REPO: sheng9571/Stock-DB

jobs:
  generate-page:
    name: Generate Stock Connect page
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.task == 'generate-page'

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Inspect source directory
        run: |
          ls -la stock-connect

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.STOCK_CN_GHCR_TOKEN }}

      - name: Pull runtime image
        run: |
          docker pull "${IMAGE_NAME}"

      - name: Smoke test SSE with Playwright
        run: |
          docker run --rm \
            -e TZ=Asia/Taipei \
            "${IMAGE_NAME}" \
            sh -c "python3 - <<'PY'
          from playwright.sync_api import sync_playwright

          ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36 Edg/148.0.0.0'
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox'])
              context = browser.new_context(
                  user_agent=ua,
                  locale='zh-TW',
                  extra_http_headers={
                      'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8,en-GB;q=0.7,en-US;q=0.6',
                      'DNT': '1',
                      'Sec-GPC': '1',
                  },
              )
              page = context.new_page()
              try:
                  response = page.goto('https://english.sse.com.cn/', wait_until='domcontentloaded', timeout=30000)
                  print('[sse-playwright] english status=' + str(response.status if response else None))
                  print('[sse-playwright] english final_url=' + page.url)
                  print('[sse-playwright] english title=' + page.title())
                  print('[sse-playwright] english html_preview=' + page.content()[:300].replace('\n', ' '))
              except Exception as exc:
                  print('[sse-playwright] english error=' + type(exc).__name__ + ': ' + str(exc))

              api_url = 'https://query.sse.com.cn/commonQuery.do?jsonCallBack=jsonpCallback93575&isPagination=false&sqlId=COMMON_SSE_CP_GPJCTPZ_GPLB_GPGK_GSGK_C&COMPANY_CODE=600000&_=1780364110552'
              try:
                  api_response = context.request.get(
                      api_url,
                      headers={
                          'Referer': 'https://english.sse.com.cn/',
                          'Accept': '*/*',
                          'Sec-Fetch-Dest': 'script',
                          'Sec-Fetch-Mode': 'no-cors',
                          'Sec-Fetch-Site': 'same-site',
                      },
                      timeout=30000,
                  )
                  text = api_response.text()
                  print('[sse-playwright] api status=' + str(api_response.status))
                  print('[sse-playwright] api bytes=' + str(len(text)))
                  print('[sse-playwright] api_preview=' + text[:300].replace('\n', ' '))
              except Exception as exc:
                  print('[sse-playwright] api error=' + type(exc).__name__ + ': ' + str(exc))
              browser.close()
          PY"

      - name: Generate page
        run: |
          mkdir -p site
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/site:/workspace/site" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.main \
                --cache-dir /workspace/cache \
                --output /workspace/site/index.html \
                --sse-stock-profile-limit 5 \
                --szse-stock-profile-limit 5 \
                --szse-etf-profile-limit 5 \
                --tradingview-etf-profile-limit-per-exchange 5 \
                --sse-market-cap-limit 5 \
                --szse-market-cap-limit 5 \
                --etf-aum-limit 5 \
                --etf-holdings-limit 5 \
                --szse-index-limit 5
            "

      - name: Verify generated page
        run: |
          test -f site/index.html
          ls -lh site/index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  low-frequency-cn-db-sse-stock-profiles:
    name: Update CN low-frequency SSE stock profiles
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'low-frequency-cn-db-sse-stock-profiles'

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Checkout Stock-DB repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STOCK_DB_REPO }}
          token: ${{ secrets.STOCK_DB_PAT }}
          path: stock-db

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.STOCK_CN_GHCR_TOKEN }}

      - name: Pull runtime image
        run: |
          docker pull "${IMAGE_NAME}"

      - name: Resolve Stock-DB schema path
        run: |
          if [ -f "${GITHUB_WORKSPACE}/stock-db/schema/country/init.sql" ]; then
            echo "STOCK_DB_INIT_SQL=/workspace/stock-db/schema/country/init.sql" >> "$GITHUB_ENV"
            echo "[stock-db] schema init path=schema/country/init.sql"
          elif [ -f "${GITHUB_WORKSPACE}/stock-db/schema/init.sql" ]; then
            echo "STOCK_DB_INIT_SQL=/workspace/stock-db/schema/init.sql" >> "$GITHUB_ENV"
            echo "[stock-db] schema init path=schema/init.sql"
          else
            echo "[stock-db] schema init sql not found"
            exit 1
          fi

      - name: Update SSE stock profiles in Stock-DB
        run: |
          mkdir -p cache
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/stock-db:/workspace/stock-db" \
            -v "${GITHUB_WORKSPACE}/cache:/workspace/cache" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.main \
                --cache-dir /workspace/cache \
                --output /workspace/site/index.html \
                --skip-szse-stock-profile \
                --skip-szse-etf-profile \
                --skip-tradingview-etf-profile \
                --skip-sse-market-cap \
                --skip-szse-market-cap \
                --skip-etf-aum \
                --skip-etf-holdings \
                --skip-szse-index \
                --skip-a50-index \
                --stock-db-path /workspace/stock-db/databases/countries/CN/current.sqlite \
                --stock-db-init-sql ${STOCK_DB_INIT_SQL} \
                --stock-db-write-stock-profiles \
                --stock-db-write-exchange SSE \
                --stock-db-require-complete-stock-profiles \
                --skip-render
            "

      - name: Verify CN SQLite DB SSE stock rows
        working-directory: stock-db
        run: |
          python3 - <<'PY'
          import sqlite3
          db = "databases/countries/CN/current.sqlite"
          con = sqlite3.connect(db)
          count = con.execute(
              "select count(*) from instruments where country_code='CN' and exchange_code='SSE' and instrument_type='stock'"
          ).fetchone()[0]
          profiles = con.execute(
              "select count(*) from instrument_profiles where instrument_id like 'CN:SSE:%:stock'"
          ).fetchone()[0]
          full_en = con.execute(
              "select count(*) from instrument_profiles where instrument_id like 'CN:SSE:%:stock' and coalesce(full_name_en, '') <> ''"
          ).fetchone()[0]
          print(f"[stock-db] verify db={db} sse_stock_instruments={count} sse_stock_profiles={profiles} full_en={full_en}")
          if count < 1000 or profiles < 1000 or full_en < 1000:
              raise SystemExit("Expected at least 1000 SSE stock profiles in DB")
          con.close()
          PY

      - name: Create Stock-DB SSE stock update PR
        working-directory: stock-db
        env:
          GH_TOKEN: ${{ secrets.STOCK_DB_PAT }}
        run: |
          if git diff --quiet --exit-code; then
            echo "[stock-db] no changes to commit"
            exit 0
          fi

          git config user.name "stock-db-bot"
          git config user.email "stock-db-bot@users.noreply.github.com"

          BRANCH="bot/update-cn-sse-stock-low-frequency-$(date -u +'%Y%m%d-%H%M%S')"
          git switch -c "$BRANCH"
          git add databases/countries/CN/current.sqlite
          git commit -m "Update CN SSE stock profiles"
          git push origin "$BRANCH"

          BASE_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [ -z "$BASE_BRANCH" ] || [ "$BASE_BRANCH" = "(unknown)" ]; then
            BASE_BRANCH="$(gh repo view "${STOCK_DB_REPO}" --json defaultBranchRef --jq '.defaultBranchRef.name')"
          fi
          if [ -z "$BASE_BRANCH" ]; then
            echo "[stock-db] failed to resolve default branch"
            exit 1
          fi
          echo "[stock-db] create PR base=${BASE_BRANCH} head=${BRANCH}"

          gh pr create \
            --repo "${STOCK_DB_REPO}" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "Update CN SSE stock profiles" \
            --body "Automated low-frequency CN SSE stock profile update. This run writes all parsed SSE stock profiles."

