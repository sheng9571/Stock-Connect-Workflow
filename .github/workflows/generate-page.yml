          ).fetchone()[0]
          profiles = con.execute(
              "select count(*) from instrument_profiles where instrument_id like 'CN:SSE:%:etf'"
          ).fetchone()[0]
          aum_metrics = con.execute(
              "select count(*) from instrument_metrics_latest where instrument_id like 'CN:SSE:%:etf' and coalesce(aum_source, '') <> ''"
          ).fetchone()[0]
          print(f"[stock-db] verify db={db} sse_etf_instruments={count} sse_etf_profiles={profiles} aum_metrics={aum_metrics}")
          if count < 50 or profiles < 50 or aum_metrics < 20:
              raise SystemExit("Expected at least 50 SSE ETF profiles and 20 AUM metrics in DB")
          con.close()
          PY

      - name: Create Stock-DB SSE ETF update PR
        working-directory: stock-db
        env:
          GH_TOKEN: ${{ secrets.STOCK_DB_PAT }}
        run: |
          if git diff --quiet --exit-code; then
            echo "[stock-db] no changes to commit"
            exit 0
          fi

          git config user.name "stock-db-bot"
          git config user.email "stock-db-bot@users.noreply.github.com"

          BRANCH="bot/update-cn-sse-etf-low-frequency-$(date -u +'%Y%m%d-%H%M%S')"
          git switch -c "$BRANCH"
          git add databases/countries/CN/current.sqlite
          git commit -m "Update CN SSE ETF profiles"
          git push origin "$BRANCH"

          BASE_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [ -z "$BASE_BRANCH" ] || [ "$BASE_BRANCH" = "(unknown)" ]; then
            BASE_BRANCH="$(gh repo view "${STOCK_DB_REPO}" --json defaultBranchRef --jq '.defaultBranchRef.name')"
          fi
          if [ -z "$BASE_BRANCH" ]; then
            echo "[stock-db] failed to resolve default branch"
            exit 1
          fi
          echo "[stock-db] create PR base=${BASE_BRANCH} head=${BRANCH}"

          gh pr create \
            --repo "${STOCK_DB_REPO}" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "Update CN SSE ETF profiles" \
            --body "Automated low-frequency CN SSE ETF profile update. This run writes all parsed SSE ETF profiles and available AUM/NAV metrics."
