name: CN Test SSE Index

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "SSE index rows to test"
        required: false
        default: "10"
      codes:
        description: "Optional comma-separated SSE index codes, e.g. 000010,000016"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

concurrency:
  group: stock-db-cn-test-sse-index
  cancel-in-progress: false

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect
  STOCK_DB_REPO: sheng9571/Stock-DB

jobs:
  cn-test-sse-index:
    name: Test SSE index parser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Checkout Stock-DB repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STOCK_DB_REPO }}
          token: ${{ secrets.STOCK_DB_PAT }}
          path: stock-db

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.STOCK_CN_GHCR_TOKEN }}

      - name: Pull runtime image
        run: docker pull "${IMAGE_NAME}"

      - name: Resolve Stock-DB schema path
        run: |
          if [ -f "${GITHUB_WORKSPACE}/stock-db/schema/country/init.sql" ]; then
            echo "STOCK_DB_INIT_SQL=/workspace/stock-db/schema/country/init.sql" >> "$GITHUB_ENV"
            echo "[stock-db] schema init path=schema/country/init.sql"
          elif [ -f "${GITHUB_WORKSPACE}/stock-db/schema/init.sql" ]; then
            echo "STOCK_DB_INIT_SQL=/workspace/stock-db/schema/init.sql" >> "$GITHUB_ENV"
            echo "[stock-db] schema init path=schema/init.sql"
          else
            echo "[stock-db] schema init sql not found"
            exit 1
          fi

      - name: Test SSE index parser and DB write
        run: |
          mkdir -p cache site
          LIMIT="${{ github.event.inputs.limit }}"
          CODES="${{ github.event.inputs.codes }}"
          CODE_ARGS=""
          if [ -n "$CODES" ]; then
            CODE_ARGS="--sse-index-codes $CODES"
          fi
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/stock-db:/workspace/stock-db" \
            -v "${GITHUB_WORKSPACE}/cache:/workspace/cache" \
            -v "${GITHUB_WORKSPACE}/site:/workspace/site" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.main \
                --cache-dir /workspace/cache \
                --output /workspace/site/index.html \
                --stock-db-path /workspace/stock-db/databases/countries/CN/current.sqlite \
                --stock-db-init-sql ${STOCK_DB_INIT_SQL} \
                --skip-sse-stock-profile \
                --skip-szse-stock-profile \
                --skip-szse-etf-profile \
                --skip-tradingview-etf-profile \
                --skip-sse-market-cap \
                --skip-szse-market-cap \
                --skip-etf-aum \
                --skip-etf-holdings \
                --skip-szse-index \
                --skip-szse-index-price \
                --skip-a50-index \
                --sse-index-limit ${LIMIT} \
                --sse-index-price-limit ${LIMIT} \
                ${CODE_ARGS} \
                --stock-db-write-sse-indexes \
                --stock-db-write-sse-index-prices \
                --skip-render
            "

      - name: Verify SSE index test rows
        working-directory: stock-db
        run: |
          python3 - <<'PY'
          import sqlite3
          db = "databases/countries/CN/current.sqlite"
          con = sqlite3.connect(db)
          indexes = con.execute(
              "select count(*) from instruments where country_code='CN' and exchange_code='SSE' and instrument_type='index'"
          ).fetchone()[0]
          constituents = con.execute(
              """
              select count(*)
              from index_constituents_latest c
              join instruments i on i.id = c.index_instrument_id
              where i.country_code='CN'
                and i.exchange_code='SSE'
                and i.instrument_type='index'
              """
          ).fetchone()[0]
          prices = con.execute(
              """
              select count(*)
              from instrument_metrics_latest m
              join instruments i on i.id = m.instrument_id
              where i.country_code='CN'
                and i.exchange_code='SSE'
                and i.instrument_type='index'
                and m.quote_source='sse-yunhq-index-snap'
              """
          ).fetchone()[0]
          print(f"[stock-db] verify sse_indexes={indexes} sse_index_constituents={constituents} sse_index_prices={prices}")
          if indexes < 1:
              raise SystemExit("Expected at least one SSE index row")
          con.close()
          PY
