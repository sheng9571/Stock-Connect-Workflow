name: CN Test Index DB Writes

on:
  workflow_dispatch:
    inputs:
      szse_index_price_limit:
        description: "Limit SZSE index prices fetched during the test"
        required: true
        default: "5"
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: stock-db-cn-test-index-db
  cancel-in-progress: true

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect
  STOCK_DB_REPO: sheng9571/Stock-DB

jobs:
  cn-test-index-db:
    name: Test A50 mapping and SZSE index prices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Checkout Stock-DB repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STOCK_DB_REPO }}
          token: ${{ secrets.STOCK_DB_PAT }}
          path: stock-db

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.STOCK_CN_GHCR_TOKEN }}

      - name: Pull parser image
        run: docker pull "${IMAGE_NAME}"

      - name: Test index DB writes
        env:
          STOCK_DB_INIT_SQL: /workspace/stock-db/schema/country/init.sql
          SZSE_INDEX_PRICE_LIMIT: ${{ github.event.inputs.szse_index_price_limit || '5' }}
        run: |
          mkdir -p cache site
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/stock-db:/workspace/stock-db" \
            -v "${GITHUB_WORKSPACE}/cache:/workspace/cache" \
            -v "${GITHUB_WORKSPACE}/site:/workspace/site" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.main \
                --cache-dir /workspace/cache \
                --output /workspace/site/index.html \
                --stock-db-path /workspace/stock-db/databases/countries/CN/current.sqlite \
                --stock-db-init-sql ${STOCK_DB_INIT_SQL} \
                --skip-sse-stock-profile \
                --skip-szse-stock-profile \
                --skip-szse-etf-profile \
                --skip-tradingview-etf-profile \
                --skip-sse-market-cap \
                --skip-szse-market-cap \
                --skip-etf-aum \
                --skip-etf-holdings \
                --skip-szse-index \
                --stock-db-write-a50-index \
                --stock-db-write-szse-index-prices \
                --szse-index-price-limit ${SZSE_INDEX_PRICE_LIMIT} \
                --skip-render
            "

      - name: Verify test DB results
        working-directory: stock-db
        run: |
          python3 - <<'PY'
          import sqlite3

          db = "databases/countries/CN/current.sqlite"
          con = sqlite3.connect(db)

          a50_profile = con.execute(
              """
              select i.instrument_id, p.short_name_en, p.full_name_en
              from instruments i
              join instrument_profiles p on p.instrument_id = i.instrument_id
              where i.instrument_id = 'CN:FTSE:XIN9:index'
              """
          ).fetchone()
          if not a50_profile:
              raise SystemExit("A50 index profile was not written")

          a50_total, a50_resolved = con.execute(
              """
              select count(*), sum(case when constituent_instrument_id is not null then 1 else 0 end)
              from index_constituents_latest
              where index_instrument_id = 'CN:FTSE:XIN9:index'
              """
          ).fetchone()
          print(f"[stock-db-test] a50_profile={a50_profile}")
          print(f"[stock-db-test] a50_constituents={a50_total} resolved={a50_resolved}")
          if a50_total < 50:
              raise SystemExit(f"Expected at least 50 A50 constituents, got {a50_total}")

          samples = con.execute(
              """
              select constituent_symbol, constituent_exchange_code, constituent_instrument_id, weight
              from index_constituents_latest
              where index_instrument_id = 'CN:FTSE:XIN9:index'
              order by weight desc
              limit 5
              """
          ).fetchall()
          for sample in samples:
              print(f"[stock-db-test] a50_sample={sample}")

          szse_price_rows = con.execute(
              """
              select count(*)
              from instrument_metrics_latest
              where instrument_id like 'CN:SZSE:%:index'
                and quote_source = 'szse-index-time-data'
                and close_price is not null
              """
          ).fetchone()[0]
          print(f"[stock-db-test] szse_index_price_rows={szse_price_rows}")
          if szse_price_rows < 1:
              raise SystemExit("Expected at least one SZSE index price row")

          price_samples = con.execute(
              """
              select instrument_id, price_date, close_price, previous_close_price, price_change, price_change_pct
              from instrument_metrics_latest
              where instrument_id like 'CN:SZSE:%:index'
                and quote_source = 'szse-index-time-data'
              order by instrument_id
              limit 5
              """
          ).fetchall()
          for sample in price_samples:
              print(f"[stock-db-test] szse_price_sample={sample}")

          con.close()
          PY

      - name: Show uncommitted DB diff
        working-directory: stock-db
        run: |
          git status --short
          echo "[stock-db-test] This workflow intentionally does not commit or push DB changes."
