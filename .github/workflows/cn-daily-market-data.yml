name: CN Daily Market Data

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Market target to parse"
        required: true
        type: choice
        default: all
        options:
          - all
          - sse-stock-market
          - szse-stock-market
          - sse-etf-market
          - szse-etf-market
          - index-prices
  schedule:
    # 15:30 Asia/Taipei, Monday-Friday.
    - cron: "30 7 * * 1-5"

permissions:
  contents: read
  packages: read

concurrency:
  group: stock-db-cn-daily-market-data
  cancel-in-progress: false

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect
  STOCK_DB_REPO: sheng9571/Stock-DB
  DAILY_MARKET_TARGET: ${{ github.event.inputs.target || 'all' }}

jobs:
  cn-daily-market-data:
    name: Parse CN daily market data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Checkout Stock-DB repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STOCK_DB_REPO }}
          token: ${{ secrets.STOCK_DB_PAT }}
          path: stock-db

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.STOCK_CN_GHCR_TOKEN }}

      - name: Pull runtime image
        run: docker pull "${IMAGE_NAME}"

      - name: Resolve Stock-DB schema path
        run: |
          if [ -f "${GITHUB_WORKSPACE}/stock-db/schema/country/init.sql" ]; then
            echo "STOCK_DB_INIT_SQL=/workspace/stock-db/schema/country/init.sql" >> "$GITHUB_ENV"
            echo "[stock-db] schema init path=schema/country/init.sql"
          elif [ -f "${GITHUB_WORKSPACE}/stock-db/schema/init.sql" ]; then
            echo "STOCK_DB_INIT_SQL=/workspace/stock-db/schema/init.sql" >> "$GITHUB_ENV"
            echo "[stock-db] schema init path=schema/init.sql"
          else
            echo "[stock-db] schema init sql not found"
            exit 1
          fi

      - name: Parse daily market data
        run: |
          mkdir -p cache site
          TARGET="${DAILY_MARKET_TARGET:-all}"
          COMMON_ARGS="\
            --cache-dir /workspace/cache \
            --output /workspace/site/index.html \
            --stock-db-path /workspace/stock-db/databases/countries/CN/current.sqlite \
            --stock-db-init-sql ${STOCK_DB_INIT_SQL} \
            --low-frequency-mode missing-only \
            --stock-db-missing-threshold 3 \
            --skip-etf-holdings \
            --skip-sse-index \
            --skip-szse-index \
            --skip-a50-index \
            --skip-render"
          case "$TARGET" in
            all)
              TARGET_ARGS="\
                --stock-db-write-daily-market-data \
                --stock-db-write-stock-profiles \
                --stock-db-write-etf-profiles \
                --stock-db-write-etf-english-full-names \
                --stock-db-write-sse-index-prices \
                --stock-db-write-szse-index-prices"
              ;;
            sse-stock-market)
              TARGET_ARGS="\
                --skip-szse-stock-profile \
                --skip-szse-etf-profile \
                --skip-tradingview-etf-profile \
                --skip-szse-market-cap \
                --skip-etf-aum \
                --skip-sse-index-price \
                --skip-szse-index-price \
                --stock-db-write-daily-market-data \
                --stock-db-write-stock-profiles \
                --stock-db-write-exchange SSE \
                --stock-db-write-instrument-type stock"
              ;;
            szse-stock-market)
              TARGET_ARGS="\
                --skip-sse-stock-profile \
                --skip-szse-etf-profile \
                --skip-tradingview-etf-profile \
                --skip-sse-market-cap \
                --skip-etf-aum \
                --skip-sse-index-price \
                --skip-szse-index-price \
                --stock-db-write-daily-market-data \
                --stock-db-write-stock-profiles \
                --stock-db-write-exchange SZSE \
                --stock-db-write-instrument-type stock"
              ;;
            sse-etf-market)
              TARGET_ARGS="\
                --skip-sse-stock-profile \
                --skip-szse-stock-profile \
                --skip-szse-etf-profile \
                --skip-szse-market-cap \
                --skip-sse-index-price \
                --skip-szse-index-price \
                --etf-aum-exchange SSE \
                --stock-db-write-daily-market-data \
                --stock-db-write-etf-profiles \
                --stock-db-write-etf-english-full-names \
                --stock-db-write-exchange SSE \
                --stock-db-write-instrument-type etf"
              ;;
            szse-etf-market)
              TARGET_ARGS="\
                --skip-sse-stock-profile \
                --skip-szse-stock-profile \
                --skip-sse-market-cap \
                --skip-sse-index-price \
                --skip-szse-index-price \
                --etf-aum-exchange SZSE \
                --stock-db-write-daily-market-data \
                --stock-db-write-etf-profiles \
                --stock-db-write-etf-english-full-names \
                --stock-db-write-exchange SZSE \
                --stock-db-write-instrument-type etf"
              ;;
            index-prices)
              TARGET_ARGS="\
                --skip-sse-stock-profile \
                --skip-szse-stock-profile \
                --skip-szse-etf-profile \
                --skip-tradingview-etf-profile \
                --skip-sse-market-cap \
                --skip-szse-market-cap \
                --skip-etf-aum \
                --stock-db-write-sse-index-prices \
                --stock-db-write-szse-index-prices"
              ;;
            *)
              echo "[config] unknown target=$TARGET"
              exit 1
              ;;
          esac
          echo "[config] daily market target=$TARGET"
          docker run --rm \
            -e TZ=Asia/Taipei \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/stock-db:/workspace/stock-db" \
            -v "${GITHUB_WORKSPACE}/cache:/workspace/cache" \
            -v "${GITHUB_WORKSPACE}/site:/workspace/site" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.main ${COMMON_ARGS} ${TARGET_ARGS}
            "

      - name: Verify CN SQLite DB daily market data
        working-directory: stock-db
        run: |
          python3 - <<'PY'
          import os
          import sqlite3
          db = "databases/countries/CN/current.sqlite"
          con = sqlite3.connect(db)
          metrics = con.execute(
              "select count(*) from instrument_metrics_latest where coalesce(close_price, '') <> '' or coalesce(market_cap_cny, '') <> '' or coalesce(aum_cny, '') <> ''"
          ).fetchone()[0]
          szse_index_prices = con.execute(
              """
              select count(*)
              from instrument_metrics_latest m
              join instruments i on i.id = m.instrument_id
              where i.country_code='CN'
                and i.exchange_code='SZSE'
                and i.instrument_type='index'
                and m.quote_source='szse-index-time-data'
              """
          ).fetchone()[0]
          sse_index_prices = con.execute(
              """
              select count(*)
              from instrument_metrics_latest m
              join instruments i on i.id = m.instrument_id
              where i.country_code='CN'
                and i.exchange_code='SSE'
                and i.instrument_type='index'
                and m.quote_source='sse-yunhq-index-snap'
              """
          ).fetchone()[0]
          instruments = con.execute("select count(*) from instruments where country_code='CN'").fetchone()[0]
          target = os.environ.get("DAILY_MARKET_TARGET", "all")
          print(f"[stock-db] verify target={target} instruments={instruments} metric_rows={metrics} sse_index_prices={sse_index_prices} szse_index_prices={szse_index_prices}")
          if target == "all" and instruments < 1000:
              raise SystemExit("Expected at least 1000 CN instruments after daily market update")
          con.close()
          PY

      - name: Check CN SQLite DB health
        working-directory: stock-db
        run: python3 tools/check_country_db.py databases/countries/CN/current.sqlite --warn-size-mb 80

      - name: Generate CN DB manifest and report
        working-directory: stock-db
        run: |
          python3 tools/generate_db_manifest.py \
            databases/countries/CN/current.sqlite \
            --country CN \
            --job "cn-daily-market-data:${DAILY_MARKET_TARGET}" \
            --output-root . \
            --warn-size-mb 80

      - name: Create Stock-DB daily market update PR
        working-directory: stock-db
        env:
          GH_TOKEN: ${{ secrets.STOCK_DB_PAT }}
        run: |
          if git diff --quiet --exit-code; then
            echo "[stock-db] no changes to commit"
            exit 0
          fi

          git config user.name "stock-db-bot"
          git config user.email "stock-db-bot@users.noreply.github.com"

          BRANCH="bot/update-cn-daily-market-$(date -u +'%Y%m%d-%H%M%S')"
          git switch -c "$BRANCH"
          git add databases/countries/CN/current.sqlite manifests/countries/CN/latest.json reports/countries/CN/latest.md
          git commit -m "Update CN daily market data (${DAILY_MARKET_TARGET})"
          git push origin "$BRANCH"

          BASE_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [ -z "$BASE_BRANCH" ] || [ "$BASE_BRANCH" = "(unknown)" ]; then
            BASE_BRANCH="$(gh repo view "${STOCK_DB_REPO}" --json defaultBranchRef --jq '.defaultBranchRef.name')"
          fi

          gh pr create \
            --repo "${STOCK_DB_REPO}" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "Update CN daily market data (${DAILY_MARKET_TARGET})" \
            --body "Automated CN daily market data update. Target: ${DAILY_MARKET_TARGET}."
