name: CN CSI File Cache Warmer

on:
  workflow_dispatch:
    inputs:
      enable_upload:
        description: "Upload downloaded files to Litterbox and write Turso links"
        required: true
        type: boolean
        default: true
      limit:
        description: "Limit CSI index codes for testing. Empty means no limit."
        required: false
        type: string
        default: ""
      codes:
        description: "Comma-separated CSI index codes. Empty means index-list order."
        required: false
        type: string
        default: ""
      download_delay_min:
        description: "Minimum seconds to sleep after each CSI file request"
        required: true
        type: string
        default: "3"
      download_delay_max:
        description: "Maximum seconds to sleep after each CSI file request"
        required: true
        type: string
        default: "5"
      components_for_non_stock:
        description: "Also download closeweight files for non-stock CSI asset classes"
        required: true
        type: boolean
        default: false
      cache_min_ttl_seconds:
        description: "Minimum remaining cache TTL required to skip an existing link"
        required: true
        type: string
        default: "7200"
      refresh_before_expiry_seconds:
        description: "Start bucketed refresh when remaining TTL is at or below this value"
        required: true
        type: string
        default: "172800"
      refresh_bucket_count:
        description: "Number of deterministic refresh buckets"
        required: true
        type: string
        default: "2"
      refresh_bucket:
        description: "Optional bucket override. Empty uses the current UTC date."
        required: false
        type: string
        default: ""
      force_refresh:
        description: "Ignore existing cache links and re-download selected symbols"
        required: true
        type: boolean
        default: false
      upload_timeout:
        description: "Bundle upload timeout seconds"
        required: true
        type: string
        default: "300"
      bundle_size:
        description: "Maximum component XLS files per ZIP bundle"
        required: true
        type: string
        default: "500"
      max_runtime_seconds:
        description: "Soft download deadline before flushing pending bundles"
        required: true
        type: string
        default: "18900"
  schedule:
    # 20:00 Asia/Taipei, every day.
    - cron: "0 12 * * *"

permissions:
  contents: read
  packages: read

concurrency:
  group: stock-db-cn-csi-file-cache-warmer
  cancel-in-progress: false

env:
  TZ: Asia/Taipei
  IMAGE_NAME: ghcr.io/sheng9571/stock-cn:latest
  PRIVATE_REPO: sheng9571/stock-connect

jobs:
  csi-file-cache-warmer:
    name: Warm CSI ${{ matrix.mode }} bundles
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        mode: [components, prices]

    steps:
      - name: Checkout Stock-Connect repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.STOCK_CONNECT_REPO_TOKEN }}
          path: stock-connect

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: sheng9571
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull runtime image
        run: docker pull "${IMAGE_NAME}"

      - name: Warm CSI ${{ matrix.mode }} bundles
        env:
          CACHE_MODE: ${{ matrix.mode }}
          TURSO_CSI_CACHE_DATABASE_URL: ${{ secrets.TURSO_CSI_CACHE_DATABASE_URL }}
          TURSO_CSI_CACHE_AUTH_TOKEN: ${{ secrets.TURSO_CSI_CACHE_AUTH_TOKEN }}
          ENABLE_UPLOAD: ${{ github.event.inputs.enable_upload || 'true' }}
          LIMIT: ${{ github.event.inputs.limit }}
          CODES: ${{ github.event.inputs.codes }}
          DOWNLOAD_DELAY_MIN: ${{ github.event.inputs.download_delay_min || '3' }}
          DOWNLOAD_DELAY_MAX: ${{ github.event.inputs.download_delay_max || '5' }}
          COMPONENTS_FOR_NON_STOCK: ${{ github.event.inputs.components_for_non_stock || 'false' }}
          CACHE_MIN_TTL_SECONDS: ${{ github.event.inputs.cache_min_ttl_seconds || '7200' }}
          REFRESH_BEFORE_EXPIRY_SECONDS: ${{ github.event.inputs.refresh_before_expiry_seconds || '172800' }}
          REFRESH_BUCKET_COUNT: ${{ github.event.inputs.refresh_bucket_count || '2' }}
          REFRESH_BUCKET: ${{ github.event.inputs.refresh_bucket }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
          UPLOAD_TIMEOUT: ${{ github.event.inputs.upload_timeout || '300' }}
          BUNDLE_SIZE: ${{ github.event.inputs.bundle_size || '500' }}
          MAX_RUNTIME_SECONDS: ${{ github.event.inputs.max_runtime_seconds || '18900' }}
        run: |
          if [ "${CACHE_MODE}" = "prices" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            DAY_OF_WEEK="$(TZ=Asia/Taipei date +%u)"
            if [ "${DAY_OF_WEEK}" -gt 5 ]; then
              echo "[config] skip weekend CSI price warmer"
              exit 0
            fi
          fi
          mkdir -p cache
          ARGS="\
            --mode ${CACHE_MODE} \
            --cache-dir /workspace/cache \
            --download-delay-min ${DOWNLOAD_DELAY_MIN:-3} \
            --download-delay-max ${DOWNLOAD_DELAY_MAX:-5} \
            --cache-min-ttl-seconds ${CACHE_MIN_TTL_SECONDS:-7200} \
            --refresh-before-expiry-seconds ${REFRESH_BEFORE_EXPIRY_SECONDS:-172800} \
            --refresh-bucket-count ${REFRESH_BUCKET_COUNT:-2} \
            --upload-timeout ${UPLOAD_TIMEOUT:-300} \
            --bundle-size ${BUNDLE_SIZE:-500} \
            --max-runtime-seconds ${MAX_RUNTIME_SECONDS:-18900}"
          if [ -n "${LIMIT:-}" ]; then
            ARGS="${ARGS} --limit ${LIMIT}"
          fi
          if [ -n "${CODES:-}" ]; then
            ARGS="${ARGS} --codes ${CODES}"
          fi
          if [ -n "${REFRESH_BUCKET:-}" ]; then
            ARGS="${ARGS} --refresh-bucket ${REFRESH_BUCKET}"
          fi
          if [ "${FORCE_REFRESH:-false}" = "true" ]; then
            ARGS="${ARGS} --disable-skip-existing-cache"
          fi
          if [ "${COMPONENTS_FOR_NON_STOCK}" = "true" ]; then
            ARGS="${ARGS} --components-for-non-stock"
          fi
          if [ "${ENABLE_UPLOAD:-true}" = "true" ]; then
            ARGS="${ARGS} --enable-upload"
            if [ -z "${TURSO_CSI_CACHE_DATABASE_URL:-}" ] || [ -z "${TURSO_CSI_CACHE_AUTH_TOKEN:-}" ]; then
              echo "[config] upload enabled but Turso secrets are missing"
              exit 1
            fi
          else
            echo "[config] upload disabled; this run only tests CSI download behavior"
          fi

          echo "[config] args=${ARGS}"
          docker run --rm \
            -e TZ=Asia/Taipei \
            -e TURSO_CSI_CACHE_DATABASE_URL="${TURSO_CSI_CACHE_DATABASE_URL}" \
            -e TURSO_CSI_CACHE_AUTH_TOKEN="${TURSO_CSI_CACHE_AUTH_TOKEN}" \
            -v "${GITHUB_WORKSPACE}/stock-connect:/workspace/stock-connect:ro" \
            -v "${GITHUB_WORKSPACE}/cache:/workspace/cache" \
            "${IMAGE_NAME}" \
            sh -c "
              cd /workspace/stock-connect &&
              python3 -m stock_connect_monitor.csi_file_cache_warmer ${ARGS}
            "
